<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velaro – Earn Smart. Play Smart.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{--bg:#0a0e1a;--card:#141c2e;--border:#2a3a5c;--p:#1e6fff;--a:#00d4ff;--g:#00e676;--r:#ff4d6d;--tx:#e8edf5;--tx2:#8a9bb8;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(30,111,255,.12),transparent 70%);top:-150px;left:-150px;border-radius:50%;}
body::after{content:'';position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(0,212,255,.08),transparent 70%);bottom:-80px;right:-80px;border-radius:50%;}
.wrap{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 28px;width:100%;max-width:400px;position:relative;z-index:1;animation:up .5s ease;}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center;margin-bottom:28px;}
.logo{width:72px;height:72px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 30px rgba(30,111,255,.3);}
.logo span{font-family:var(--fh);font-size:36px;font-weight:800;color:#fff;}
h1{font-family:var(--fh);font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tag{color:var(--tx2);font-size:13px;margin-top:6px;letter-spacing:1px;}
.tabs{display:flex;background:#111827;border-radius:12px;padding:4px;margin-bottom:24px;border:1px solid var(--border);}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:10px;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .2s;}
.tab.on{background:var(--p);color:#fff;font-weight:600;box-shadow:0 2px 12px rgba(30,111,255,.4);}
.form{display:none;flex-direction:column;gap:14px;}
.form.on{display:flex;}
.ig{position:relative;display:flex;align-items:center;}
.ig input{width:100%;padding:13px 14px 13px 42px;border:1.5px solid var(--border);border-radius:12px;font-family:var(--fb);font-size:14px;color:var(--tx);background:#111827;outline:none;transition:border-color .2s,box-shadow .2s;}
.ig input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(30,111,255,.15);}
.ig input::placeholder{color:#4a5a78;}
.ii{position:absolute;left:14px;color:var(--tx2);font-size:14px;pointer-events:none;}
.eye{position:absolute;right:14px;color:var(--tx2);cursor:pointer;font-size:14px;}
.btn{padding:14px;background:linear-gradient(135deg,#1e6fff,#0d4fd6);color:#fff;border:none;border-radius:12px;font-family:var(--fh);font-size:15px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(30,111,255,.4);transition:opacity .2s,transform .1s;}
.btn:active{transform:scale(.98);}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1e2a42;color:var(--tx);padding:12px 24px;border-radius:50px;font-size:14px;border:1px solid var(--border);z-index:9999;transition:transform .3s;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--g);color:var(--g);}
.toast.err{border-color:var(--r);color:var(--r);}
</style>
</head>
<body>
<div id="t" class="toast"></div>
<div class="wrap">
  <div class="brand">
    <div class="logo"><span>V</span></div>
    <h1>Velaro</h1>
    <p class="tag">Earn Smart. Play Smart.</p>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="sw('l',this)">Login</button>
    <button class="tab" onclick="sw('s',this)">Sign Up</button>
  </div>
  <div id="lf" class="form on">
    <div class="ig"><i class="fa fa-envelope ii"></i><input type="email" id="le" placeholder="Email Address"/></div>
    <div class="ig"><i class="fa fa-lock ii"></i><input type="password" id="lp" placeholder="Password"/><i class="fa fa-eye eye" onclick="tp('lp',this)"></i></div>
    <button class="btn" onclick="doLogin()"><span>Login</span><div class="sp" id="ls"></div></button>
  </div>
  <div id="sf" class="form">
    <div class="ig"><i class="fa fa-envelope ii"></i><input type="email" id="se" placeholder="Email Address"/></div>
    <div class="ig"><i class="fa fa-lock ii"></i><input type="password" id="sp2" placeholder="Password (min 6)"/><i class="fa fa-eye eye" onclick="tp('sp2',this)"></i></div>
    <div class="ig"><i class="fa fa-user-plus ii"></i><input type="text" id="sr" placeholder="Referral Code (Optional)"/></div>
    <button class="btn" onclick="doSignup()"><span>Create Account</span><div class="sp" id="ss"></div></button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,collection,query,where,getDocs,updateDoc,addDoc,serverTimestamp,increment}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const FB={apiKey:"AIzaSyAicy4ym0omYMS5te0BXsR15d7jTrcydak",authDomain:"velaro-c487e.firebaseapp.com",projectId:"velaro-c487e",storageBucket:"velaro-c487e.firebasestorage.app",messagingSenderId:"394100524704",appId:"1:394100524704:web:a44d395c404d6f6eb2abc5"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);
const BASE="/Velaro/";
function toast(m,t=""){const el=document.getElementById("t");el.textContent=m;el.className="toast show "+t;setTimeout(()=>el.className="toast",3500);}
function genRef(){return"VLR"+Math.random().toString(36).substring(2,7).toUpperCase();}
function fbErr(c){return{"auth/email-already-in-use":"Email already registered","auth/invalid-email":"Invalid email","auth/weak-password":"Password too weak (min 6)","auth/user-not-found":"No account found","auth/wrong-password":"Wrong password","auth/invalid-credential":"Wrong email or password"}[c]||"Something went wrong. Try again.";}
window.sw=function(f,btn){document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));document.querySelectorAll(".form").forEach(x=>x.classList.remove("on"));document.getElementById(f+"f").classList.add("on");btn.classList.add("on");};
window.tp=function(id,ico){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";ico.classList.toggle("fa-eye");ico.classList.toggle("fa-eye-slash");};
window.doLogin=async function(){
  const email=document.getElementById("le").value.trim();
  const pass=document.getElementById("lp").value;
  if(!email)return toast("Enter your email","err");
  if(!pass)return toast("Enter your password","err");
  const sp=document.getElementById("ls");sp.style.display="block";
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){sp.style.display="none";toast(fbErr(e.code),"err");}
};
window.doSignup=async function(){
  const email=document.getElementById("se").value.trim();
  const pass=document.getElementById("sp2").value;
  const ref=document.getElementById("sr").value.trim();
  if(!email)return toast("Enter your email","err");
  if(!pass)return toast("Enter a password","err");
  if(pass.length<6)return toast("Password must be at least 6 characters","err");
  const sp=document.getElementById("ss");sp.style.display="block";
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const uid=cred.user.uid;
    const rc=genRef();
    let referredBy=null;
    if(ref){
      const q=query(collection(db,"users"),where("referralCode","==",ref));
      const s=await getDocs(q);
      if(!s.empty){
        referredBy=s.docs[0].id;
        await updateDoc(doc(db,"users",referredBy),{balance:increment(100),teamEarnings:increment(100)});
        await addDoc(collection(db,"transactions"),{userId:referredBy,type:"referral_bonus",amount:100,note:"Referral bonus",createdAt:serverTimestamp()});
        toast("Referral applied! Your referrer gets Rs 100","ok");
      } else {
        toast("Referral code not found — continuing without it","err");
      }
    }
    await setDoc(doc(db,"users",uid),{uid,email,displayName:"",balance:0,role:"user",referralCode:rc,referredBy,totalDeposit:0,totalWithdraw:0,totalProfit:0,teamEarnings:0,blocked:false,currency:"PKR",wallet:{method:"",number:"",name:""},createdAt:serverTimestamp()});
    toast("Account created! Welcome to Velaro","ok");
  }catch(e){sp.style.display="none";toast(fbErr(e.code),"err");}
};
onAuthStateChanged(auth,async(user)=>{
  if(user){
    try{
      const s=await getDoc(doc(db,"users",user.uid));
      if(s.exists()){
        const role=s.data().role;
        toast("Login successful!","ok");
        setTimeout(()=>{
          window.location.href=role==="admin"?BASE+"admin.html":BASE+"dashboard.html";
        },1000);
      }
    }catch(e){toast("Connection error. Check internet.","err");}
  }
});
</script>
</body>
</html>
