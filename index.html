<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velaro – Earn Smart. Play Smart.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg1:#0a0e1a;--bg2:#020617;
  --glass:rgba(20,28,46,0.65);
  --border:rgba(255,255,255,0.08);
  --p:#1e6fff;--a:#00d4ff;--g:#00e676;--r:#ff4d6d;--gold:#f4b942;
  --tx:#e8edf5;--tx2:#8a9bb8;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{min-height:100vh;font-family:var(--fb);color:var(--tx);overflow-x:hidden;}
body{display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}

/* ANIMATED BG */
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 8s ease-in-out infinite;}
.o1{width:400px;height:400px;background:rgba(30,111,255,0.15);top:-100px;left:-100px;animation-delay:0s;}
.o2{width:350px;height:350px;background:rgba(0,212,255,0.1);bottom:-80px;right:-80px;animation-delay:3s;}
.o3{width:250px;height:250px;background:rgba(0,230,118,0.08);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.5s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-20px) scale(1.05);}}

/* GRID LINES */
.bg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(30,111,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(30,111,255,0.03) 1px,transparent 1px);background-size:40px 40px;}

/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--glass);backdrop-filter:blur(20px);color:var(--tx);padding:14px 28px;border-radius:50px;font-size:14px;border:1px solid var(--border);z-index:9999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(0,230,118,0.4);color:var(--g);box-shadow:0 0 20px rgba(0,230,118,0.2);}
.toast.err{border-color:rgba(255,77,109,0.4);color:var(--r);box-shadow:0 0 20px rgba(255,77,109,0.2);}

/* CARD */
.card{position:relative;z-index:1;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:28px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05);animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}

/* BRAND */
.brand{text-align:center;margin-bottom:32px;}
.logo-wrap{position:relative;display:inline-block;margin-bottom:16px;}
.logo{width:76px;height:76px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 0 rgba(30,111,255,0.4);animation:logoPulse 2.5s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{box-shadow:0 0 0 0 rgba(30,111,255,0.4),0 0 30px rgba(30,111,255,0.3);}50%{box-shadow:0 0 0 12px rgba(30,111,255,0),0 0 50px rgba(30,111,255,0.5);}}
.logo span{font-family:var(--fh);font-size:38px;font-weight:800;color:#fff;}
.brand-name{font-family:var(--fh);font-size:32px;font-weight:800;background:linear-gradient(135deg,#fff,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px;}
.brand-tag{color:var(--tx2);font-size:13px;margin-top:6px;letter-spacing:1.5px;text-transform:uppercase;}

/* TABS */
.tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:14px;padding:4px;margin-bottom:28px;border:1px solid var(--border);}
.tab{flex:1;padding:11px;border:none;background:transparent;border-radius:11px;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all 0.3s ease;letter-spacing:0.3px;}
.tab.on{background:linear-gradient(135deg,var(--p),rgba(0,212,255,0.8));color:#fff;font-weight:600;box-shadow:0 4px 16px rgba(30,111,255,0.4);}

/* FORMS */
.form{display:none;flex-direction:column;gap:14px;}
.form.on{display:flex;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* INPUTS */
.ig{position:relative;display:flex;align-items:center;}
.ig input{width:100%;padding:14px 14px 14px 44px;border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;font-family:var(--fb);font-size:14px;color:var(--tx);background:rgba(255,255,255,0.04);outline:none;transition:all 0.3s ease;-webkit-text-fill-color:var(--tx);}
.ig input:focus{border-color:rgba(30,111,255,0.6);background:rgba(30,111,255,0.06);box-shadow:0 0 0 4px rgba(30,111,255,0.1),0 0 20px rgba(30,111,255,0.1);}
.ig input::placeholder{color:rgba(138,155,184,0.6);}
.ii{position:absolute;left:15px;color:var(--tx2);font-size:14px;pointer-events:none;transition:color 0.3s;}
.ig input:focus~.ii,.ig:focus-within .ii{color:var(--p);}
.eye{position:absolute;right:15px;color:var(--tx2);cursor:pointer;font-size:14px;transition:color 0.3s;}
.eye:hover{color:var(--tx);}

/* BUTTON */
.btn{padding:15px;background:linear-gradient(135deg,var(--p),var(--a));color:#fff;border:none;border-radius:14px;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(30,111,255,0.4);transition:all 0.3s ease;letter-spacing:0.5px;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity 0.3s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(30,111,255,0.5);}
.btn:hover::after{opacity:1;}
.btn:active{transform:translateY(0) scale(0.98);}

/* RIPPLE */
.btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);animation:ripple 0.6s linear;pointer-events:none;}
@keyframes ripple{to{transform:scale(4);opacity:0;}}

/* SPINNER */
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg"><div class="bg-orb o1"></div><div class="bg-orb o2"></div><div class="bg-orb o3"></div></div>
<div id="t" class="toast"></div>
<div class="card">
  <div class="brand">
    <div class="logo-wrap"><div class="logo"><span>V</span></div></div>
    <div class="brand-name">Velaro</div>
    <div class="brand-tag">Earn Smart · Play Smart</div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="sw('l',this)">Login</button>
    <button class="tab" onclick="sw('s',this)">Sign Up</button>
  </div>
  <div id="lf" class="form on">
    <div class="ig"><input type="email" id="le" placeholder="Email Address"/><i class="fa fa-envelope ii"></i></div>
    <div class="ig"><input type="password" id="lp" placeholder="Password"/><i class="fa fa-lock ii"></i><i class="fa fa-eye eye" onclick="tp('lp',this)"></i></div>
    <button class="btn" onclick="doLogin(event)"><span>Login</span><div class="sp" id="ls"></div></button>
  </div>
  <div id="sf" class="form">
    <div class="ig"><input type="email" id="se" placeholder="Email Address"/><i class="fa fa-envelope ii"></i></div>
    <div class="ig"><input type="password" id="sp2" placeholder="Password (min 6)"/><i class="fa fa-lock ii"></i><i class="fa fa-eye eye" onclick="tp('sp2',this)"></i></div>
    <div class="ig"><input type="text" id="sr" placeholder="Referral Code (Optional)"/><i class="fa fa-user-plus ii"></i></div>
    <button class="btn" onclick="doSignup(event)"><span>Create Account</span><div class="sp" id="ss"></div></button>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,collection,query,where,getDocs,updateDoc,addDoc,serverTimestamp,increment}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const FB={apiKey:"AIzaSyAicy4ym0omYMS5te0BXsR15d7jTrcydak",authDomain:"velaro-c487e.firebaseapp.com",projectId:"velaro-c487e",storageBucket:"velaro-c487e.firebasestorage.app",messagingSenderId:"394100524704",appId:"1:394100524704:web:a44d395c404d6f6eb2abc5"};
const app=initializeApp(FB);const auth=getAuth(app);const db=getFirestore(app);
const BASE="/Velaro/";
function toast(m,t=""){const el=document.getElementById("t");el.textContent=m;el.className="toast show "+t;setTimeout(()=>el.className="toast",3500);}
function genRef(){return"VLR"+Math.random().toString(36).substring(2,7).toUpperCase();}
function fbErr(c){return{"auth/email-already-in-use":"Email already registered","auth/invalid-email":"Invalid email format","auth/weak-password":"Password too weak (min 6 chars)","auth/user-not-found":"No account found with this email","auth/wrong-password":"Wrong password","auth/invalid-credential":"Wrong email or password"}[c]||"Something went wrong. Try again.";}
function addRipple(btn,e){const r=document.createElement("span");r.className="ripple";const rect=btn.getBoundingClientRect();r.style.cssText=`width:${Math.max(btn.clientWidth,btn.clientHeight)*2}px;height:${Math.max(btn.clientWidth,btn.clientHeight)*2}px;left:${e.clientX-rect.left-btn.clientWidth}px;top:${e.clientY-rect.top-btn.clientHeight}px`;btn.appendChild(r);setTimeout(()=>r.remove(),600);}
window.sw=function(f,btn){document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));document.querySelectorAll(".form").forEach(x=>x.classList.remove("on"));document.getElementById(f+"f").classList.add("on");btn.classList.add("on");};
window.tp=function(id,ico){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";ico.classList.toggle("fa-eye");ico.classList.toggle("fa-eye-slash");};
window.doLogin=async function(e){
  addRipple(e.currentTarget,e);
  const email=document.getElementById("le").value.trim();const pass=document.getElementById("lp").value;
  if(!email)return toast("Please enter your email","err");
  if(!pass)return toast("Please enter your password","err");
  const sp=document.getElementById("ls");sp.style.display="block";
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(er){sp.style.display="none";toast(fbErr(er.code),"err");}
};
window.doSignup=async function(e){
  addRipple(e.currentTarget,e);
  const email=document.getElementById("se").value.trim();const pass=document.getElementById("sp2").value;const ref=document.getElementById("sr").value.trim();
  if(!email)return toast("Please enter your email","err");
  if(!pass)return toast("Please enter a password","err");
  if(pass.length<6)return toast("Password must be at least 6 characters","err");
  const sp=document.getElementById("ss");sp.style.display="block";
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const uid=cred.user.uid;const rc=genRef();let referredBy=null;
    if(ref){const q=query(collection(db,"users"),where("referralCode","==",ref));const s=await getDocs(q);if(!s.empty){referredBy=s.docs[0].id;await updateDoc(doc(db,"users",referredBy),{balance:increment(100),teamEarnings:increment(100)});await addDoc(collection(db,"transactions"),{userId:referredBy,type:"referral_bonus",amount:100,note:"Referral bonus",createdAt:serverTimestamp()});}}
    await setDoc(doc(db,"users",uid),{uid,email,displayName:"",balance:0,role:"user",referralCode:rc,referredBy,totalDeposit:0,totalWithdraw:0,totalProfit:0,teamEarnings:0,blocked:false,currency:"PKR",wallet:{method:"",number:"",name:""},createdAt:serverTimestamp()});
    toast("Account created! Welcome to Velaro 🎉","ok");
  }catch(er){sp.style.display="none";toast(fbErr(er.code),"err");}
};
onAuthStateChanged(auth,async user=>{
  if(user){try{const s=await getDoc(doc(db,"users",user.uid));if(s.exists()){toast("Login successful! Welcome back 👋","ok");setTimeout(()=>{window.location.href=s.data().role==="admin"?BASE+"admin.html":BASE+"dashboard.html";},1000);}}catch(e){toast("Connection error. Check internet.","err");}}
});
</script>
</body>
  </html>
