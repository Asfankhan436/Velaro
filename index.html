<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velaro – Earn Smart. Play Smart.</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div id="toast" class="toast"></div>
<div class="auth-wrapper">
  <div class="auth-brand">
    <div class="brand-logo"><span class="logo-v">V</span></div>
    <h1 class="brand-name">Velaro</h1>
    <p class="brand-tag">Earn Smart. Play Smart.</p>
  </div>
  <div class="auth-tabs">
    <button class="tab-btn active" onclick="switchTab('login', this)">Login</button>
    <button class="tab-btn" onclick="switchTab('signup', this)">Sign Up</button>
  </div>
  <div id="loginForm" class="auth-form active">
    <div class="input-group">
      <i class="fa fa-envelope input-icon"></i>
      <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="off"/>
    </div>
    <div class="input-group">
      <i class="fa fa-lock input-icon"></i>
      <input type="password" id="loginPassword" placeholder="Password"/>
      <i class="fa fa-eye toggle-pass" onclick="togglePass('loginPassword', this)"></i>
    </div>
    <button class="btn-primary" onclick="loginUser()">
      <span>Login</span>
      <div class="btn-loader hidden" id="loginLoader"></div>
    </button>
  </div>
  <div id="signupForm" class="auth-form">
    <div class="input-group">
      <i class="fa fa-envelope input-icon"></i>
      <input type="email" id="signupEmail" placeholder="Email Address" autocomplete="off"/>
    </div>
    <div class="input-group">
      <i class="fa fa-lock input-icon"></i>
      <input type="password" id="signupPassword" placeholder="Password (min 6 chars)"/>
      <i class="fa fa-eye toggle-pass" onclick="togglePass('signupPassword', this)"></i>
    </div>
    <div class="input-group">
      <i class="fa fa-user-plus input-icon"></i>
      <input type="text" id="referralInput" placeholder="Referral Code (Optional)" autocomplete="off"/>
    </div>
    <button class="btn-primary" onclick="signupUser()">
      <span>Create Account</span>
      <div class="btn-loader hidden" id="signupLoader"></div>
    </button>
  </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
