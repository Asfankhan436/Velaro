<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velaro – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg1:#0a0e1a;--bg2:#020617;--glass:rgba(20,28,46,0.65);--glass2:rgba(20,28,46,0.85);--border:rgba(255,255,255,0.08);--p:#1e6fff;--a:#00d4ff;--g:#00e676;--r:#ff4d6d;--gold:#f4b942;--tx:#e8edf5;--tx2:#8a9bb8;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;}
html,body{min-height:100vh;font-family:var(--fb);color:var(--tx);overflow-x:hidden;}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2));position:relative;}
.hidden{display:none!important;}

/* BG */
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.o1{width:500px;height:500px;background:rgba(30,111,255,0.08);top:-150px;left:-150px;animation:orbF 10s ease-in-out infinite;}
.o2{width:400px;height:400px;background:rgba(0,212,255,0.06);bottom:-100px;right:-100px;animation:orbF 12s ease-in-out infinite reverse;}
@keyframes orbF{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-30px);}}

/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--glass2);backdrop-filter:blur(20px);color:var(--tx);padding:14px 28px;border-radius:50px;font-size:14px;border:1px solid var(--border);z-index:9999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(0,230,118,0.5);color:var(--g);}
.toast.err{border-color:rgba(255,77,109,0.5);color:var(--r);}
.toast.info{border-color:rgba(0,212,255,0.5);color:var(--a);}

/* LOADER */
.loader{position:fixed;inset:0;background:var(--bg1);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:24px;}
.lbox{width:84px;height:84px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:24px;display:flex;align-items:center;justify-content:center;animation:lPulse 1.4s ease-in-out infinite;box-shadow:0 0 40px rgba(30,111,255,0.4);}
.lbox span{font-family:var(--fh);font-size:38px;font-weight:800;color:#fff;}
.loader-text{color:var(--tx2);font-size:12px;letter-spacing:3px;text-transform:uppercase;animation:fio 1.4s ease-in-out infinite;}
@keyframes lPulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(30,111,255,0.4);}50%{transform:scale(1.08);box-shadow:0 0 60px rgba(30,111,255,0.6);}}
@keyframes fio{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* SKELETON */
.skel{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:skelAnim 1.5s infinite;border-radius:8px;}
@keyframes skelAnim{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* APP */
.app{max-width:480px;margin:0 auto;padding-bottom:110px;position:relative;z-index:1;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--glass2);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.hl{display:flex;align-items:center;gap:12px;}
.hr{display:flex;align-items:center;gap:10px;}
.ava{width:42px;height:42px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:16px;color:#fff;cursor:pointer;box-shadow:0 0 15px rgba(30,111,255,0.3);transition:transform 0.2s,box-shadow 0.2s;}
.ava:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(30,111,255,0.5);}
.wt{font-size:11px;color:var(--tx2);letter-spacing:0.5px;}
.ue{font-size:13px;color:var(--tx);font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vlogo{font-family:var(--fh);font-weight:800;font-size:20px;background:linear-gradient(135deg,#fff,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.bell{width:38px;height:38px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--tx2);transition:all 0.2s;}
.bell:hover{background:rgba(30,111,255,0.1);border-color:rgba(30,111,255,0.3);color:var(--p);}
.lbtn{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.2);color:var(--r);padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;transition:all 0.2s;}
.lbtn:hover{background:rgba(255,77,109,0.2);}

/* BALANCE CARD */
.bcard{margin:20px 20px 0;background:linear-gradient(135deg,rgba(13,33,81,0.9),rgba(26,58,122,0.8));backdrop-filter:blur(20px);border-radius:26px;padding:30px 26px;position:relative;overflow:hidden;border:1px solid rgba(30,111,255,0.2);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(30,111,255,0.1);}
.bcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(30,111,255,0.05),transparent 60%);pointer-events:none;}
.bc1,.bc2{position:absolute;border-radius:50%;opacity:0.06;background:var(--a);pointer-events:none;}
.bc1{width:220px;height:220px;top:-70px;right:-70px;}
.bc2{width:160px;height:160px;bottom:-60px;left:0;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;}
.blbl{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:10px;letter-spacing:1.5px;text-transform:uppercase;position:relative;}
.bnum{font-family:var(--fh);font-size:42px;font-weight:800;color:#fff;margin-bottom:6px;position:relative;text-shadow:0 0 30px rgba(0,212,255,0.3);}
.bnum .bsym{font-size:20px;color:var(--a);margin-right:4px;}
.bsub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:24px;position:relative;}
.brow{display:flex;justify-content:space-between;gap:16px;border-top:1px solid rgba(255,255,255,0.08);padding-top:20px;position:relative;}
.bitem .blb{font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
.bitem .bvl{font-size:13px;font-weight:700;color:#fff;}
.refc{color:var(--a)!important;cursor:pointer;transition:opacity 0.2s;}
.refc:hover{opacity:0.8;}

/* TIMER */
.tmr{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:20px;padding:18px 20px;margin:16px 20px 0;}
.tlbl{font-size:11px;color:var(--tx2);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 1.5s infinite;display:inline-block;box-shadow:0 0 6px var(--g);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.tdsp{display:flex;justify-content:center;gap:12px;}
.tu{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px;min-width:56px;text-align:center;position:relative;overflow:hidden;}
.tu::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,0.05),transparent);pointer-events:none;}
.tn{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--a);display:block;text-shadow:0 0 10px rgba(0,212,255,0.4);}
.tl{font-size:9px;color:var(--tx2);letter-spacing:1px;text-transform:uppercase;}

/* QUICK ACTIONS */
.qact{display:flex;gap:10px;margin:20px 20px 0;}
.qbtn{flex:1;background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:18px;padding:16px 8px;text-align:center;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;}
.qbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent);pointer-events:none;}
.qbtn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.15);}
.qbtn:active{transform:translateY(0) scale(0.97);}
.qico{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:18px;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.2);}
.qi1{background:linear-gradient(135deg,#00e676,#00b248);box-shadow:0 4px 15px rgba(0,230,118,0.3);}
.qi2{background:linear-gradient(135deg,#ff4d6d,#cc0033);box-shadow:0 4px 15px rgba(255,77,109,0.3);}
.qi3{background:linear-gradient(135deg,#f4b942,#e07b00);box-shadow:0 4px 15px rgba(244,185,66,0.3);}
.qi4{background:linear-gradient(135deg,#a855f7,#7c3aed);box-shadow:0 4px 15px rgba(168,85,247,0.3);}
.qbtn p{font-size:11px;color:var(--tx2);font-weight:500;letter-spacing:0.3px;}

/* SECTION */
.sec{margin:24px 20px 0;}
.stit{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--tx);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.stit::before{content:'';width:3px;height:20px;background:linear-gradient(var(--p),var(--a));border-radius:3px;display:inline-block;box-shadow:0 0 8px rgba(30,111,255,0.4);}

/* SERVICES */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.si{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:18px;padding:16px 8px;text-align:center;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;}
.si::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.02),transparent);pointer-events:none;}
.si:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.12);}
.si:active{transform:scale(0.94);}
.si p{font-size:10px;color:var(--tx2);margin-top:9px;font-weight:500;letter-spacing:0.2px;}
.sico{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:17px;color:#fff;}
.i1{background:linear-gradient(135deg,#00e676,#00b248);box-shadow:0 4px 12px rgba(0,230,118,0.25);}
.i2{background:linear-gradient(135deg,#ff4d6d,#cc0033);box-shadow:0 4px 12px rgba(255,77,109,0.25);}
.i3{background:linear-gradient(135deg,var(--p),#0d4fd6);box-shadow:0 4px 12px rgba(30,111,255,0.25);}
.i4{background:linear-gradient(135deg,#a855f7,#7c3aed);box-shadow:0 4px 12px rgba(168,85,247,0.25);}
.i5{background:linear-gradient(135deg,var(--gold),#e07b00);box-shadow:0 4px 12px rgba(244,185,66,0.25);}
.i6{background:linear-gradient(135deg,var(--a),#0099cc);box-shadow:0 4px 12px rgba(0,212,255,0.25);}
.i7{background:linear-gradient(135deg,#ff6b35,#cc4400);box-shadow:0 4px 12px rgba(255,107,53,0.25);}
.i8{background:linear-gradient(135deg,#ec4899,#9d174d);box-shadow:0 4px 12px rgba(236,72,153,0.25);}

/* STATS */
.sgr{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.scard{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:20px;padding:20px;position:relative;overflow:hidden;transition:all 0.3s ease;cursor:default;}
.scard:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.3);}
.scard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.02),transparent);pointer-events:none;}
.scico{font-size:36px;opacity:0.06;position:absolute;right:14px;bottom:14px;color:var(--a);}
.sclbl{font-size:11px;color:var(--tx2);margin-bottom:10px;letter-spacing:0.5px;}
.scval{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--tx);}
.s1{border-left:3px solid var(--g);box-shadow:inset 3px 0 15px rgba(0,230,118,0.05);}
.s2{border-left:3px solid var(--r);box-shadow:inset 3px 0 15px rgba(255,77,109,0.05);}
.s3{border-left:3px solid var(--p);box-shadow:inset 3px 0 15px rgba(30,111,255,0.05);}
.s4{border-left:3px solid #a855f7;box-shadow:inset 3px 0 15px rgba(168,85,247,0.05);}

/* PLANS */
.plans{display:flex;flex-direction:column;gap:14px;}
.pcard{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:22px;padding:22px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;transition:all 0.3s ease;}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--p),var(--a));box-shadow:0 0 10px rgba(30,111,255,0.4);}
.pcard::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(30,111,255,0.03),transparent);pointer-events:none;}
.pcard:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.3);border-color:rgba(30,111,255,0.2);}
.pinfo h4{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--tx);}
.pinfo p{font-size:12px;color:var(--tx2);margin-top:5px;}
.pprofit{font-size:14px;color:var(--g)!important;font-weight:700;margin-top:7px!important;text-shadow:0 0 8px rgba(0,230,118,0.3);}
.pbtn{padding:11px 20px;background:linear-gradient(135deg,var(--p),var(--a));color:#fff;border:none;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(30,111,255,0.3);font-family:var(--fb);}
.pbtn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(30,111,255,0.4);}
.pbtn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
.pbtn.act{background:linear-gradient(135deg,var(--g),#00b248);box-shadow:0 4px 15px rgba(0,230,118,0.3);}

/* TEAM */
.tlist{display:flex;flex-direction:column;gap:10px;}
.titem{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;transition:all 0.3s ease;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.titem:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px);}
.tava{width:42px;height:42px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;box-shadow:0 0 12px rgba(30,111,255,0.3);flex-shrink:0;}

/* REWARD */
.rwcard{background:linear-gradient(135deg,rgba(26,46,90,0.8),rgba(13,31,66,0.9));backdrop-filter:blur(16px);border:1px solid rgba(244,185,66,0.15);border-radius:22px;padding:30px 26px;text-align:center;box-shadow:0 0 30px rgba(244,185,66,0.05);}
.rwico{font-size:48px;margin-bottom:16px;display:block;color:var(--gold);text-shadow:0 0 20px rgba(244,185,66,0.4);animation:iconFloat 3s ease-in-out infinite;}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.rwcard p{font-size:14px;line-height:1.8;color:var(--tx2);}
.rwcard strong{color:var(--gold);text-shadow:0 0 8px rgba(244,185,66,0.3);}
.rwcode{display:inline-block;margin-top:20px;background:linear-gradient(135deg,var(--gold),#e07b00);color:#000;padding:12px 28px;border-radius:50px;cursor:pointer;font-weight:700;font-size:14px;font-family:var(--fh);box-shadow:0 4px 20px rgba(244,185,66,0.3);transition:all 0.3s ease;letter-spacing:0.5px;}
.rwcode:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(244,185,66,0.4);}

/* TX */
.txlist{display:flex;flex-direction:column;gap:10px;}
.txitem{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;transition:all 0.3s ease;animation:fadeUp 0.3s ease;}
.txitem:hover{border-color:rgba(255,255,255,0.1);transform:translateY(-2px);}
.txtype{font-size:14px;font-weight:600;color:var(--tx);}
.txmeta{font-size:11px;color:var(--tx2);margin-top:3px;}
.txamt{font-family:var(--fh);font-size:16px;font-weight:800;}
.cr{color:var(--g);text-shadow:0 0 8px rgba(0,230,118,0.3);}
.db{color:var(--r);text-shadow:0 0 8px rgba(255,77,109,0.3);}

/* BADGE */
.badge{display:inline-block;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;backdrop-filter:blur(10px);}
.bp{background:rgba(244,185,66,0.1);color:var(--gold);border:1px solid rgba(244,185,66,0.25);}
.ba{background:rgba(0,230,118,0.1);color:var(--g);border:1px solid rgba(0,230,118,0.25);}
.br2{background:rgba(255,77,109,0.1);color:var(--r);border:1px solid rgba(255,77,109,0.25);}

/* MODAL */
.mover{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center;z-index:500;backdrop-filter:blur(8px);animation:fi 0.2s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.mbox{background:rgba(14,22,40,0.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-top:1px solid rgba(255,255,255,0.1);border-radius:28px 28px 0 0;padding:32px 26px 44px;width:100%;max-width:480px;animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mbox h3{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:22px;color:var(--tx);}
.macts{display:flex;gap:10px;margin-top:18px;}
.ig{position:relative;display:flex;align-items:center;margin-bottom:12px;}
.ig input{width:100%;padding:14px 14px 14px 44px;border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;font-family:var(--fb);font-size:14px;color:var(--tx);background:rgba(255,255,255,0.04);outline:none;transition:all 0.3s;-webkit-text-fill-color:var(--tx);}
.ig input:focus{border-color:rgba(30,111,255,0.5);background:rgba(30,111,255,0.05);box-shadow:0 0 0 4px rgba(30,111,255,0.08);}
.ig input::placeholder{color:rgba(138,155,184,0.5);}
.ii{position:absolute;left:15px;color:var(--tx2);font-size:14px;pointer-events:none;}
.btn2{padding:15px;background:linear-gradient(135deg,var(--p),var(--a));color:#fff;border:none;border-radius:14px;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(30,111,255,0.4);transition:all 0.3s;letter-spacing:0.5px;}
.btn2:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(30,111,255,0.5);}
.btn3{padding:14px;background:rgba(255,255,255,0.04);color:var(--tx);border:1px solid var(--border);border-radius:14px;font-size:14px;cursor:pointer;width:100%;transition:all 0.3s;}
.btn3:hover{background:rgba(255,255,255,0.08);}

/* PROFILE */
.pava{width:84px;height:84px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:34px;font-weight:800;color:#fff;margin:0 auto 22px;box-shadow:0 0 30px rgba(30,111,255,0.4),0 0 0 4px rgba(30,111,255,0.1);}
.prow{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.prow .lb{font-size:11px;color:var(--tx2);margin-bottom:5px;letter-spacing:0.5px;}
.prow .vv{font-size:14px;font-weight:600;color:var(--tx);}

/* WALLET */
.wmlist{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.wmbtn{padding:15px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;color:var(--tx);font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all 0.3s;width:100%;}
.wmbtn:hover,.wmbtn.sel{border-color:rgba(30,111,255,0.4);background:rgba(30,111,255,0.08);box-shadow:0 0 15px rgba(30,111,255,0.1);}
.wmbtn i{font-size:18px;color:var(--p);}

/* DINFO */
.dinfo{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.15);border-radius:14px;padding:16px;margin-bottom:16px;font-size:13px;color:var(--tx2);line-height:1.9;}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--tx2);}
.empty i{font-size:44px;margin-bottom:16px;display:block;opacity:0.2;}
.empty p{font-size:14px;}
